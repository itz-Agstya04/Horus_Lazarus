<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project Lazarus | Clinical Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .medical-grid { background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 20px 20px; }
        .status-emergency { border-left: 4px solid #ef4444; background: rgba(239, 68, 68, 0.1); }
        .status-critical { border-left: 4px solid #f97316; background: rgba(249, 115, 22, 0.1); }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 medical-grid min-h-screen p-8">

    <div class="flex justify-between items-end mb-10">
        <div>
            <h1 class="text-4xl font-black tracking-tighter text-blue-500">LAZARUS <span class="text-slate-500 text-lg font-light tracking-widest ml-2">v2.0</span></h1>
            <p class="text-slate-400 font-mono text-xs uppercase">Integrity-Validated Patient Surveillance</p>
        </div>
        <div class="flex gap-8">
            <div class="text-right">
                <span class="block text-slate-500 text-[10px] uppercase font-bold">Emergency Cases</span>
                <span id="kpi-emergency" class="text-2xl font-mono text-red-500">--</span>
            </div>
            <div class="text-right">
                <span class="block text-slate-500 text-[10px] uppercase font-bold">System Integrity</span>
                <span id="kpi-integrity" class="text-2xl font-mono text-green-400">--%</span>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
        <div class="lg:col-span-3 bg-slate-800/50 rounded-xl border border-slate-700 overflow-hidden backdrop-blur-md">
            <div class="p-4 border-b border-slate-700 flex justify-between bg-slate-800/80">
                <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400">Active Patient Triage</h2>
            </div>
            <div class="overflow-y-auto max-h-[700px]">
                <table class="w-full text-left border-collapse">
                    <thead class="sticky top-0 bg-slate-900 text-slate-500 text-[10px] uppercase">
                        <tr>
                            <th class="p-4">Ident / Room</th>
                            <th class="p-4">Status</th>
                            <th class="p-4 text-center">Final Score</th>
                            <th class="p-4 text-center">HR / SpO2</th>
                            <th class="p-4">Confidence</th>
                        </tr>
                    </thead>
                    <tbody id="patient-rows" class="divide-y divide-slate-700/50 font-mono text-sm">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="space-y-6">
            <div id="detail-panel" class="bg-slate-800 border border-slate-700 rounded-xl p-6 hidden">
                <h3 class="text-blue-400 font-bold mb-4" id="det-name">Patient Name</h3>
                <div class="space-y-3 text-xs mb-6">
                    <div class="flex justify-between border-b border-slate-700 pb-1">
                        <span class="text-slate-500">Anomaly Score</span>
                        <span class="text-red-400" id="det-anomaly">--</span>
                    </div>
                    <div class="flex justify-between border-b border-slate-700 pb-1">
                        <span class="text-slate-500">Risk Score</span>
                        <span class="text-orange-400" id="det-risk">--</span>
                    </div>
                </div>
                <div class="h-40">
                    <canvas id="miniChart"></canvas>
                </div>
            </div>
            
            <div class="bg-slate-800 border border-slate-700 rounded-xl p-6">
                <h3 class="text-slate-400 font-bold text-[10px] uppercase mb-4">Risk Distribution</h3>
                <canvas id="distChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        async function init() {
            const res = await fetch('dashboard_data.json');
            const data = await res.json();
            
            // Populate Table
            const container = document.getElementById('patient-rows');
            container.innerHTML = data.map(p => `
                <tr class="hover:bg-slate-700/30 cursor-pointer transition-all ${p.status.toLowerCase() === 'emergency' ? 'status-emergency' : ''}">
                    <td class="p-4">
                        <div class="font-bold text-slate-200">${p.name}</div>
                        <div class="text-[10px] text-slate-500">${p.ghost_id} | R-${p.room_id}</div>
                    </td>
                    <td class="p-4">
                        <span class="px-2 py-0.5 rounded text-[10px] font-black border ${getStatusStyles(p.status)}">
                            ${p.status}
                        </span>
                    </td>
                    <td class="p-4 text-center font-bold text-lg">${p.final_score.toFixed(2)}</td>
                    <td class="p-4 text-center">
                        <span class="${p.bpm > 100 ? 'text-red-400' : ''}">${p.bpm}</span>
                        <span class="text-slate-600 mx-1">/</span>
                        <span class="${p.spo2 < 94 ? 'text-yellow-500' : ''}">${p.spo2.toFixed(1)}%</span>
                    </td>
                    <td class="p-4">
                        <div class="w-full bg-slate-700 h-1 rounded-full">
                            <div class="bg-blue-500 h-full" style="width: ${p.confidence_score * 100}%"></div>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusStyles(status) {
            const map = {
                'Emergency': 'bg-red-900/40 text-red-400 border-red-700',
                'Critical': 'bg-orange-900/40 text-orange-400 border-orange-700',
                'Warning': 'bg-yellow-900/40 text-yellow-400 border-yellow-700',
                'Stable': 'bg-green-900/40 text-green-400 border-green-700'
            };
            return map[status] || '';
        }

        init();
    </script>
</body>
</html>
